<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 2 Work and Exercises</title>
  </head>
  <body>
    <!--This is the lists lesson of lesson 2-->
    <!--There are 3-types of lists in HTML-->
    <!--Unordered Lists
        Ordered Lists
        Definition Lists    
    -->


    <!--Unordered Lists-->
    <p>
      Unordered Lists
    </p>
    <ul><!--Declaring unordered lists-->
      <li>item 1</li>
      <li>item 2</li>
      <li>item 3</li>
    </ul>

    <!--Ordered Lists-->
    <p>Ordered Lists</p>
    <ol>
      <li> item</li>
      <li> item</li>
      <li> item</li>
    </ol>

    <!--Definition Lists-->
    <!--dt: is for term representation-->
    <!--dd: is for each represented definition-->
    <p>
      Definiton Lists
    </p>
    <dl>
      <dt>Term 1</dt>
      <dd>Definition 1</dd>
    </dl>

    <!--Nested Lists-->
    <p>
      Nested Lists
    </p>
    <ul>
    <li>First item</li>
    <li>Second item
      <ul>
        <li>Sub-item 1</li>
        <li>Sub-item 2</li>
      </ul>
    </li>
    <li>Third item</li>
  </ul>

  </body>
</html>
